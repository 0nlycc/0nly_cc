<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Only_cc | Personal Site V1</title>
  <style>
    :root {
      --bg-1: #060816;
      --bg-2: #281449;
      --bg-3: #5f3e8e;
      --card: rgba(255,255,255,0.10);
      --card-border: rgba(255,255,255,0.14);
      --soft-text: rgba(255,255,255,0.78);
      --button-bg: rgba(255,255,255,0.88);
      --button-border: rgba(255,255,255,0.50);
      --button-text: #17122b;
      --shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      background:
        radial-gradient(circle at 50% 35%, rgba(210, 132, 255, 0.35), transparent 0 20%),
        radial-gradient(circle at 20% 80%, rgba(116, 177, 255, 0.22), transparent 0 18%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
      overflow-x: hidden;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.5;
    }

    .glow.one {
      width: 260px;
      height: 260px;
      background: rgba(179, 108, 255, 0.34);
      top: 6%;
      left: 14%;
      animation: floatA 10s ease-in-out infinite;
    }

    .glow.two {
      width: 320px;
      height: 320px;
      background: rgba(104, 181, 255, 0.24);
      right: 10%;
      bottom: 8%;
      animation: floatB 12s ease-in-out infinite;
    }

    @keyframes floatA {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(18px) translateX(8px); }
    }

    @keyframes floatB {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-16px) translateX(-10px); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }

    .shell {
      width: min(100%, 460px);
    }

    .card {
      position: relative;
      border: 1px solid var(--card-border);
      background: linear-gradient(180deg, rgba(10,18,48,0.82), rgba(163,96,205,0.24) 60%, rgba(127,188,255,0.18));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 28px 22px 24px;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 28%, transparent 72%, rgba(255,255,255,0.05));
      pointer-events: none;
    }

    .profile-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 8px;
    }

    .profile-photo {
      width: 106px;
      height: 106px;
      object-fit: cover;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,0.18);
      box-shadow: 0 14px 36px rgba(0,0,0,0.30);
    }

    .username {
      margin: 18px 0 0;
      font-size: 2rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .tagline {
      margin-top: 10px;
      font-size: 1rem;
      line-height: 1.55;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
    }

    .subline {
      margin-top: 8px;
      font-size: 0.98rem;
      line-height: 1.6;
      color: var(--soft-text);
    }

    .links {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }

    .link-button {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      background: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: 0 16px 30px rgba(0,0,0,0.14);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .link-button:hover {
      transform: translateY(-2px) scale(1.01);
      background: white;
      box-shadow: 0 18px 36px rgba(0,0,0,0.18);
    }

    .thumb {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 14px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
    }

    .link-copy {
      min-width: 0;
      flex: 1;
    }

    .link-title {
      margin: 0;
      font-size: 1.24rem;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .link-subtitle {
      margin: 5px 0 0;
      font-size: 0.92rem;
      line-height: 1.45;
      color: rgba(23,18,43,0.72);
      font-weight: 600;
    }

    .arrow {
      font-size: 1.35rem;
      color: rgba(23,18,43,0.56);
      padding-left: 8px;
      flex-shrink: 0;
    }

    .footer {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.56);
      margin-top: 16px;
      letter-spacing: 0.02em;
    }

    .badge-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.86);
      backdrop-filter: blur(10px);
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 28px;
        padding: 24px 18px 20px;
      }

      .username {
        font-size: 1.8rem;
      }

      .tagline,
      .subline {
        font-size: 0.94rem;
      }

      .link-title {
        font-size: 1.16rem;
      }

      .thumb {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="glow one"></div>
    <div class="glow two"></div>
  </div>

  <main class="page">
    <section class="shell">
      <div class="card">
        <div class="profile-wrap">
          <img class="profile-photo" src="https://i.imgur.com/Uj4g775.png" alt="Only_cc profile" />
          <h1 class="username">@Only_cc</h1>
          <div class="badge-row">
            <span class="badge">Creator</span>
            <span class="badge">Roblox</span>
          </div>
          <p class="tagline">hi</p>
          <p class="subline">Tap the buttons below to visit my TikTok and Roblox profile.</p>
        </div>

        <div class="links">
          <a class="link-button" href="https://www.tiktok.com/@0nly_co" target="_blank" rel="noreferrer noopener">
            <img class="thumb" src="https://i.imgur.com/xK5tGFY.png" alt="TikTok thumbnail" />
            <div class="link-copy">
              <p class="link-title">TikTok</p>
              <p class="link-subtitle">Watch my videos!</p>
            </div>
            <div class="arrow">↗</div>
          </a>

          <a class="link-button" href="https://www.roblox.com/ko/users/3977096520/profile" target="_blank" rel="noreferrer noopener">
            <img class="thumb" src="https://i.imgur.com/iCkDZRW.png" alt="Roblox thumbnail" />
            <div class="link-copy">
              <p class="link-title">Roblox Profile</p>
              <p class="link-subtitle">Follow me!</p>
            </div>
            <div class="arrow">↗</div>
          </a>
        </div>
      </div>

      <p class="footer">Only_cc · Tictok</p>
    </section>
  </main>
</body>
</html>
